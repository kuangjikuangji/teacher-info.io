<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>工商管理专业导师信息查询系统</title>
<style>
:root {
  --bg: #f5f7fb;
  --panel: #ffffff;
  --text: #1f2937;
  --muted: #667085;
  --primary: #0f4c81;
  --primary2: #1d75b9;
  --soft: #eef6ff;
  --line: #d8e3ef;
  --tag: #eef6ff;
  --shadow: 0 18px 45px rgba(15, 76, 129, .11);
  --radius: 18px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
  background: radial-gradient(circle at top left, #dcecff 0, #f3f6fb 36%, #f8fafc 100%);
  color: var(--text);
}
.hero {
  background: linear-gradient(135deg, #0b3d66, #0f4c81 52%, #2776b9);
  color: white;
  padding: 32px 42px 34px;
  position: relative;
  overflow: hidden;
}
.hero::after {
  content: "";
  position: absolute;
  right: -120px;
  top: -120px;
  width: 340px;
  height: 340px;
  background: rgba(255,255,255,.08);
  border-radius: 50%;
}
.hero h1 {
  position: relative;
  margin: 0;
  font-size: 30px;
  letter-spacing: .04em;
  font-weight: 800;
}
.hero p {
  position: relative;
  margin: 10px 0 0;
  color: rgba(255,255,255,.88);
  font-size: 15px;
}
.wrap {
  max-width: 1280px;
  margin: -20px auto 34px;
  padding: 0 24px;
  position: relative;
}
.stats {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
  margin-bottom: 16px;
}
.stat {
  background: rgba(255,255,255,.94);
  border: 1px solid rgba(216,227,239,.9);
  border-radius: 16px;
  padding: 16px 20px;
  box-shadow: var(--shadow);
}
.stat .num { font-size: 26px; font-weight: 800; color: var(--primary); }
.stat .label { margin-top: 4px; color: var(--muted); font-size: 13px; }
.main { display: grid; grid-template-columns: 370px 1fr; gap: 18px; }
.card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
.sidebar { padding: 18px; align-self: start; position: sticky; top: 14px; }
.search { display: grid; gap: 10px; }
input, select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 11px 13px;
  font-size: 14px;
  background: #fff;
  color: var(--text);
  outline: none;
}
input:focus, select:focus { border-color: var(--primary2); box-shadow: 0 0 0 3px rgba(29,117,185,.12); }
.filters { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.toolbar { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin: 12px 0 10px; color: var(--muted); font-size: 13px; }
.smallbtn { border: 1px solid var(--line); border-radius: 10px; background: #fff; padding: 8px 10px; cursor: pointer; color: var(--primary); }
.teacher-list { display: grid; gap: 8px; max-height: 520px; overflow: auto; padding-right: 4px; }
.teacher-btn { border: 1px solid var(--line); background: #fff; border-radius: 14px; padding: 12px 13px; text-align: left; cursor: pointer; transition: .16s ease; }
.teacher-btn:hover { transform: translateY(-1px); border-color: #9bc5e8; background: #fbfdff; }
.teacher-btn.active { background: linear-gradient(135deg, #0f4c81, #1e75b7); color: white; border-color: transparent; }
.teacher-btn .name { font-weight: 800; font-size: 16px; }
.teacher-btn .meta { margin-top: 4px; font-size: 12px; color: var(--muted); line-height: 1.45; }
.teacher-btn.active .meta { color: rgba(255,255,255,.84); }
.detail { padding: 0; min-height: 670px; overflow: hidden; }
.detail.blank { background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.9)); }
.blank-hint { min-height: 670px; display: flex; align-items: center; justify-content: center; color: #98a2b3; font-size: 15px; }
.detail-inner { padding: 26px 30px 30px; }
.detail-head { display: flex; justify-content: space-between; gap: 20px; align-items: start; padding-bottom: 18px; border-bottom: 1px solid var(--line); }
.name-title h2 { margin: 0; font-size: 30px; color: var(--primary); letter-spacing: .03em; }
.name-title .sub { margin-top: 8px; color: var(--muted); }
.badges { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.badge { background: var(--tag); color: #15507c; border: 1px solid #cde4f8; border-radius: 999px; padding: 7px 11px; font-size: 13px; white-space: nowrap; }
.info-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin: 20px 0; }
.info { border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; background: #fbfdff; }
.info.full { grid-column: 1 / -1; }
.info .k { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
.info .v { font-size: 16px; line-height: 1.65; font-weight: 600; word-break: break-word; }
.section-title { margin: 22px 0 12px; display: flex; align-items: center; gap: 10px; font-size: 18px; color: var(--primary); font-weight: 800; }
.section-title::before { content: ""; width: 5px; height: 20px; border-radius: 4px; background: var(--primary2); display: inline-block; }
.longtext { border: 1px solid var(--line); background: #ffffff; border-radius: 16px; padding: 18px 20px; white-space: pre-wrap; line-height: 1.78; font-size: 14.5px; word-break: break-word; }
.empty-text { color: var(--muted); background: #f8fafc; border: 1px dashed var(--line); padding: 18px 20px; border-radius: 16px; }
mark { background: #fff2a8; padding: 0 2px; border-radius: 3px; }
.footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px; }
@media (max-width: 900px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .main { grid-template-columns: 1fr; }
  .sidebar { position: static; }
  .detail-head { flex-direction: column; }
  .badges { justify-content: flex-start; }
  .info-grid { grid-template-columns: 1fr; }
  .hero { padding: 28px 22px; }
  .hero h1 { font-size: 24px; }
  .wrap { padding: 0 14px; }
}
@media print {
  body { background: #fff; }
  .hero, .sidebar, .stats, .footer { display:none; }
  .wrap { margin: 0; max-width: none; padding: 0; }
  .main { display: block; }
  .card, .detail { box-shadow: none; border: none; padding: 0; min-height: 0; }
  .detail-inner { padding: 0; }
}
</style>
</head>
<body>
  <header class="hero">
    <h1>工商管理专业导师信息查询系统</h1>
    <p>学生可按教师姓名、职称、学历或研究方向进行筛选，选择导师后查看详细信息、科研成果与项目清单、指导学生论文及竞赛获奖等内容。</p>
  </header>
  <div class="wrap">
    <section class="stats" aria-label="教师基本统计">
      <div class="stat"><div class="num">20</div><div class="label">导师总数</div></div>
      <div class="stat"><div class="num">11</div><div class="label">博士学历教师</div></div>
      <div class="stat"><div class="num">3</div><div class="label">教授</div></div>
      <div class="stat"><div class="num">9</div><div class="label">副教授</div></div>
    </section>
    <main class="main">
      <aside class="card sidebar">
        <div class="search">
          <select id="teacherSelect" aria-label="选择教师"></select>
          <input id="searchInput" type="search" placeholder="输入姓名、研究方向、成果或竞赛关键词检索">
          <div class="filters">
            <select id="degreeFilter"><option value="">全部学历</option></select>
            <select id="titleFilter"><option value="">全部职称</option></select>
          </div>
        </div>
        <div class="toolbar">
          <span id="resultCount">共 0 位教师</span>
          <button class="smallbtn" onclick="resetFilters()" type="button">重置筛选</button>
        </div>
        <div id="teacherList" class="teacher-list"></div>
      </aside>
      <section id="detailBox" class="card detail blank" aria-live="polite"></section>
    </main>
    <div class="footer">数据来源：工商管理专业导师信息一览表；本页面为静态查询页，可直接部署到 GitHub Pages、学院网站或校内平台。</div>
  </div>

let currentId = null;

function unique(arr) {
  return [...new Set(arr.filter(Boolean))].sort((a,b) => a.localeCompare(b, 'zh-CN'));
}
function escapeHTML(str) {
  return String(str || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function highlight(text, keyword) {
  const safe = escapeHTML(text || '');
  if (!keyword) return safe;
  const kw = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safe.replace(new RegExp(kw, 'gi'), m => `<mark>${m}</mark>`);
}
function normalize(s) { return String(s || '').toLowerCase().trim(); }
function displayValue(s) {
  return String(s ?? '').trim();
}
function groupedTeachers(list) {
  const groups = ['教授', '副教授', '讲师'];
  return groups.map(title => ({ title, items: list.filter(t => t.title === title) })).filter(g => g.items.length);
}
function initOptions() {
  const teacherSelect = document.getElementById('teacherSelect');
  teacherSelect.innerHTML = '<option value="">请选择导师</option>' + groupedTeachers(teachers).map(g =>
    `<optgroup label="${escapeHTML(g.title)}">${g.items.map(t => `<option value="${t.id}">${escapeHTML(t.name)}｜${escapeHTML(t.title || '')}</option>`).join('')}</optgroup>`
  ).join('');
  teacherSelect.value = '';
  teacherSelect.addEventListener('change', e => {
    currentId = e.target.value ? Number(e.target.value) : null;
    renderList();
    renderDetail(currentId);
  });

  const degreeFilter = document.getElementById('degreeFilter');
  unique(teachers.map(t => t.degree)).forEach(v => degreeFilter.insertAdjacentHTML('beforeend', `<option value="${escapeHTML(v)}">${escapeHTML(v)}</option>`));
  degreeFilter.addEventListener('change', () => { currentId = null; document.getElementById('teacherSelect').value = ''; renderAll(); });

  const titleFilter = document.getElementById('titleFilter');
  unique(teachers.map(t => t.title)).forEach(v => titleFilter.insertAdjacentHTML('beforeend', `<option value="${escapeHTML(v)}">${escapeHTML(v)}</option>`));
  titleFilter.addEventListener('change', () => { currentId = null; document.getElementById('teacherSelect').value = ''; renderAll(); });

  document.getElementById('searchInput').addEventListener('input', () => { currentId = null; document.getElementById('teacherSelect').value = ''; renderAll(); });
}
function getFiltered() {
  const kw = normalize(document.getElementById('searchInput').value);
  const degree = document.getElementById('degreeFilter').value;
  const title = document.getElementById('titleFilter').value;
  return teachers.filter(t => {
    const hay = normalize([t.name, t.degree, t.title, t.office, t.direction, t.achievements, t.competitions, t.contact].join(' '));
    return (!kw || hay.includes(kw)) && (!degree || t.degree === degree) && (!title || t.title === title);
  });
}
function renderList() {
  const list = document.getElementById('teacherList');
  const filtered = getFiltered();
  document.getElementById('resultCount').textContent = `共 ${filtered.length} 位教师`;
  const kw = document.getElementById('searchInput').value.trim();
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-text">未找到匹配教师</div>';
    return;
  }
  list.innerHTML = groupedTeachers(filtered).map(g => `
    <div class="group-title">${escapeHTML(g.title)}</div>
    ${g.items.map(t => `
      <button class="teacher-btn ${t.id === currentId ? 'active' : ''}" onclick="selectTeacher(${t.id})" type="button">
        <div class="name">${highlight(t.name, kw)}</div>
        <div class="meta">${escapeHTML(t.title || '')} · ${escapeHTML(t.degree || '')} · ${escapeHTML(t.office || '')}</div>

      </button>

  `).join('');
}

      </div>
      <div class="info-grid">
        <div class="info"><div class="k">姓名</div><div class="v">${escapeHTML(t.name)}</div></div>
        <div class="info"><div class="k">最高学历</div><div class="v">${escapeHTML(t.degree || '')}</div></div>
        <div class="info"><div class="k">职称</div><div class="v">${escapeHTML(t.title || '')}</div></div>
        <div class="info"><div class="k">办公地点</div><div class="v">${escapeHTML(t.office || '')}</div></div>
        <div class="info full"><div class="k">研究方向</div><div class="v">${escapeHTML(t.direction || '')}</div></div>
        <div class="info full"><div class="k">联系方式</div><div class="v">${escapeHTML(contact)}</div></div>
      </div>
      <div class="section-title">科研成果与项目清单</div>
      <div class="longtext">${escapeHTML(achievements)}</div>
      <div class="section-title">指导学生论文、竞赛获奖</div>
      <div class="longtext">${escapeHTML(competitions)}</div>
    </div>`;
}
function renderAll() { renderList(); renderDetail(currentId); }
function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('degreeFilter').value = '';
  document.getElementById('titleFilter').value = '';
  currentId = null;
  document.getElementById('teacherSelect').value = '';
  renderAll();
}
initOptions();
renderAll();
</script>
</body>
